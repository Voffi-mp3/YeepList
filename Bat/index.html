<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>The Yeeps PvP List</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico" />
<link rel="stylesheet" href="./Bat.css">
<meta name="description" content="The Yeeps PvP lists" />
<style>
@import url('./Bat.css');

</style>
</head>

<div class="rank-popup" id="rankPopup"></div>

<body>
<div class="wrap">

  
  <aside class="sidebar">
    <div class="brand">
      <img src="https://yeeplist.page.gd/images/PvP_Rank.jpeg" class="logo">
      <div>
        <h1>The Yeeps List</h1>
        <p style="color:var(--muted);font-size:12px;">PvP leaderboards</p>
      </div>
    </div>

    <nav class="category-list">
      <button class="active" data-cat="all"><img src="https://yeeplist.page.gd/images/PvP_Rank.jpeg" alt="" />All Rankings</button>
      <button class="external-link-btn"
        onclick="window.open('https://voffi-mp3.github.io/YeepList/Unblocked','_blank')"><img src="https://yeeplist.page.gd/images/PvP_Rank.jpeg">
  Unblocked PvP
</button>
		
		<button class="external-link-btn"
        onclick="window.open('https://voffi-mp3.github.io/YeepList/Smp','_blank')"><img src="https://yeeplist.page.gd/images/Desert.png">
  Smp PvP
</button>
		
		<button class="external-link-btn"
        onclick="window.open('https://voffi-mp3.github.io/YeepList/Mace','_blank')"><img src="https://yeeplist.page.gd/images/SwarmSlayer.jpg">
  Mace PvP
</button>
				<button class="external-link-btn"
        onclick="window.open('https://voffi-mp3.github.io/YeepList/Bat','_blank')"><img src="https://yeeplist.page.gd/images/placeholder.png">
  Bat PvP
</button>
				<button class="external-link-btn"
        onclick="window.open('https://voffi-mp3.github.io/YeepList/Snow','_blank')"><img src="https://yeeplist.page.gd/images/Freeze_Glove.png">
  Snow PvP
</button>
		<button class="external-link-btn">Other Websites (for pvp)</button>
      <button class="external-link-btn"
        onclick="window.open('teams.html','_blank')"><img src="https://yeeplist.page.gd/images/placeholder.png">
  Team Rankings
</button>
      <button class="external-link-btn"
        onclick="window.open('Card.html','_blank')"><img src="https://yeeplist.page.gd/images/placeholder.png">
  Player Cards
</button>
              <button class="external-link-btn"
        onclick="window.open('ltm.html','_blank')"><img src="https://yeeplist.page.gd/images/favicon_ltm.png">
  LTM's
</button>
      <button class="external-link-btn">Other Stuff</button>
      <button data-cat="credits"><img src="https://yeeplist.page.gd/images/credits.png" alt="" />Credits And Testers</button>
      <button class="external-link-btn"></button>
      <button data-cat="discord" onclick="window.open('https://discord.gg/jTshXwr4Q','_blank')"><img src="https://yeeplist.page.gd/images/Discord.jpeg" alt="" />Join Our Discord</button>
    </nav>
  </aside>

  
  <section class="main">

    <header class="main-head">
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="muted-btn" id="menuToggle">☰ Menu</button>
        <div>
          <h2>Bat PvP Leaderboard</h2>
          <p style="color:var(--muted);font-size:13px;">The Yeeps Lists</p>
        </div>
      </div>

      <div class="controls">
        <div class="search">
          <input id="search" placeholder="Search player...">
        </div>
		<button class="btn" id="yeeplistBtn"><img src="https://yeeplist.page.gd/images/Info.png" alt="" /> Info</button>
      </div>
    </header>

    <div class="grid" id="leaderboard"></div>

    <footer>The Yeeps List (we are not affiliated with Trass Games)</footer>
  </section>
</div>


<div class="modal" id="modal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img id="modalAvatar" src="" />
    <div class="modal-name" id="modalName"></div>
    <div class="modal-team" id="modalTeam"></div>
    <div class="modal-rank"><img id="modalRankImg" src="" /> <span id="modalRank"></span></div>
    <div class="modal-score" id="modalScore"></div>
    <div class="modal-cats" id="modalCats"></div>
  </div>
</div>
</body>
<script src="./Bat.js"></script>
</html>
