<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="./ltm_style.css">
    <style>
    @import url('./ltm_style.css');
</style>
</head>
</head>

<div class="rank-popup" id="rankPopup"></div>

<body>
<div class="wrap">

  <aside class="sidebar">
    <div class="brand">
      <img src="https://yeeplist.page.gd/images/PvP_Rank.jpeg" class="logo">
      <div>
        <h1>Limited Time Modes</h1>
        <p style="color:var(--muted);font-size:12px;">Current Event: Unkown</p>
      </div>
    </div>

    <nav class="category-list">
      <button class="active" data-cat="all"><img src="https://yeeplist.page.gd/images/PvP_Rank.jpeg" alt="" />Overall Score</button>
      <button data-cat="Easter Event"><img src="https://yeeplist.page.gd/images/placeholder.png" alt="" />Easter Event 2026</button>

        <button class="external-link-btn"></button>
      <button class="external-link-btn"
        onclick="window.open('https://yeeplist.page.gd/','_blank')"><img src="https://yeeplist.page.gd/images/placeholder.png">back</button>
      <button data-cat="discord" onclick="window.open('https://discord.gg/vMBmPT3R','_blank')"><img src="https://yeeplist.page.gd/images/Discord.jpeg" alt="" />Join Our Discord</button>
    </nav>
  </aside>

  <section class="main">

    <header class="main-head">
      <div style="display:flex;gap:12px;align-items:center;">
        <button class="muted-btn" id="menuToggle">☰ Menu</button>
        <div>
          <h2>Limited Time Modes</h2>
          <p style="color:var(--muted);font-size:13px;">Scores for limited events, does not affect regular rankings.</p>
        </div>
      </div>

      <div class="controls">
        <div class="search">
          <input id="search" placeholder="Search player...">
        </div>
		<button class="btn" id="yeeplistBtn"><img src="https://yeeplist.page.gd/images/Info.png" alt="" /> Info</button>
      </div>
    </header>

    <div class="grid" id="leaderboard"></div>

    <footer>The Yeeps List (we are not affiliated with Trass Games)</footer>
  </section>
</div>

<div class="modal" id="modal">
  <div class="modal-card">
    <button class="modal-close" onclick="closeModal()">×</button>
    <img id="modalAvatar" src="" />
    <div class="modal-name" id="modalName"></div>
    <div class="modal-team" id="modalTeam"></div>
    <div class="modal-rank"><img id="modalRankImg" src="" /> <span id="modalRank"></span></div>
    <div class="modal-score" id="modalScore"></div>
    <div class="modal-cats" id="modalCats"></div>
  </div>
</div>
</body>
<script src="./ltm_script.js"></script>
</html>
