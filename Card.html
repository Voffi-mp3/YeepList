<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yeep Rank Card</title>
<link rel="icon" type="image/x-icon" href="images/favicon.ico" />

<style>
body {
  margin:0;
  background:#0b0b0d;
  font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
  color:white;
}

.wrapper {
  max-width:900px;
  margin:40px auto;
  text-align:center;
}

.search {
  margin-bottom:20px;
}

input {
  padding:10px;
  width:220px;
  border-radius:8px;
  border:none;
  outline:none;
  color: #ffffff;
  background: #171717;
}

button {
  padding:10px 14px;
  margin-left:6px;
  border:none;
  border-radius:8px;
  color:white;
  cursor:pointer;
  font-weight:600;  
  background:linear-gradient(-165deg, #0b0b0d 0%, #960330 100%);
}

button:hover {
  opacity:0.9;
}

#card {
  display:flex;
  justify-content:center;
}

.profile-card {
  width:720px;
  background:linear-gradient(135deg,#0b0b0d,#960330);
  border-radius:16px;
  border:#ff004f;
  padding:24px;
  box-shadow:0 0 0 3px rgba(255,0,80,0.5);
}

.header {
  display:flex;
  gap:20px;
  align-items:center;
}

.avatar {
  width:110px;
  height:110px;
  border-radius:12px;
  object-fit:cover;
  background:#111;
}

.header-info h1 {
  margin:0;
  font-size:28px;
}

.title {
  display:flex;
  align-items:center;
  gap:8px;
  margin-top:6px;
  font-weight:600;
  color:#ff5fa2;
}

.title img {
  width:22px;
}

.stats {
  display:grid;
  grid-template-columns: repeat(3, 1fr);
  margin-top:24px;
  gap:16px;
  text-align:center;
}

.stat {
  background:rgba(0,0,0,0.35);
  border-radius:12px;
  padding:14px;
}

.stat span {
  display:block;
  font-size:12px;
  opacity:0.7;
}

.stat strong {
  font-size:20px;
}

.tiers {
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:22px;
  justify-content:center;
}

.tier {
  width:64px;
  text-align:center;
  font-size:11px;
}

.tier img {
  width:100%;
  border-radius:8px;
  background: linear-gradient(180deg, transparent, transparent,#960330);
}

.tier span {
  display:block;
  margin-top:4px;
  opacity:0.85;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="search">
    <input id="playerInput" placeholder="Enter player name">
    <button onclick="generateCard()">Find Player Card</button>
    <button onclick="downloadCard()">Download Card</button>
  </div>

  <div id="card"></div>

</div>


<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

<script type="module">

  import { players } from './Players.js';


function generateCard() {
  const input = document.getElementById("playerInput").value.trim();
  const player = players.find(p => p.name.toLowerCase() === input.toLowerCase());

  if (!player) {
    card.innerHTML = "<p>❌ Player not found ❌</p>";
    return;
  }

  document.getElementById("card").innerHTML = `
    <div class="profile-card">
      <div class="header">
        <img class="avatar" src="${player.avatar}">
        <div class="header-info">
          <h1>${player.name}</h1>
          <div class="title">
            <img src="${player.rank}">
            ${player.title}
          </div>
        </div>
      </div>

      <div class="stats">
        <div class="stat"><span>Score: </span><strong>${player.score}</strong></div>
        <div class="stat"><span>Rank: </span><strong>${player.title.split(" ")[0]}</strong></div>
        <div class="stat"><span>Team: </span><strong>${player.team}</strong></div>
      </div>

      <div class="tiers">
        ${player.categories.map(c => `
          <div class="tier">
            <img src="${c.img}">
            <span>${c.pos}</span>
          </div>
        `).join("")}
      </div>
    </div>
  `;
}

function downloadCard() {
  const card = document.querySelector(".profile-card");
  if (!card) return alert("❌ Card not found ❌");

  html2canvas(card, { scale:2, backgroundColor:null })
    .then(canvas => {
      const a = document.createElement("a");
      a.download = "player-card.png";
      a.href = canvas.toDataURL();
      a.click();
    });
}
</script>

</body>
</html>
